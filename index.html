document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"contact\" style=\"padding: 90px 24px; max-width: 1080px; margin: 0 auto;\">\n    <div style=\"display: grid; grid-template-columns: minmax(260px,1.1fr) minmax(260px,.9fr); gap: 48px;\">\n      <div>\n        <h2 style=\"font-family: Archivo, sans-serif; font-weight: 800; font-size: clamp(30px, 4.5vw, 44px); letter-spacing: -0.02em; margin: 0 0 16px;\">Ready when you are.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.65; color: #4A4D52; margin: 0 0 28px; max-width: 460px;\">One call gets a site visit on the calendar. Joseph measures, quotes and installs — no middlemen, no call centre.<\u002Fp>\n        <a href=\"tel:+16477871159\" style=\"display: inline-flex; align-items: center; gap: 10px; font-family: Archivo, sans-serif; font-weight: 800; font-size: clamp(24px, 4vw, 32px); color: #0A0B0D; text-decoration: none; margin-bottom: 8px;\">647-787-1159<\u002Fa>\n        <p style=\"font-size: 13px; color: #4A4D52; margin: 0 0 30px;\">Tap to call — Joseph answers directly.<\u002Fp>\n        <a href=\"tel:+16477871159\" style=\"display: inline-block; font-family: Inter, sans-serif; font-weight: 500; font-size: 15px; color: #fff; background: #0A5FFF; padding: 14px 28px; border-radius: 12px; text-decoration: none;\">Call for a free quote<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"background: #F4F6F8; border-radius: 18px; padding: 30px; display: flex; flex-direction: column; gap: 22px;\">\n        <div>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .1em; color: #0A5FFF;\">HOURS<\u002Fspan>\n          <p style=\"font-size: 15px; margin: 6px 0 0; line-height: 1.7;\">Mon–Fri 8–9<br>Sat 8–4<br>Sun closed<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .1em; color: #0A5FFF;\">SERVICE AREA<\u002Fspan>\n          <p style=\"font-size: 15px; margin: 6px 0 0; line-height: 1.6;\">Across the Greater Toronto Area — Joseph comes to you.<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;\">\n            <sc-for list=\"{{ cities }}\" as=\"city\" hint-placeholder-count=\"6\">\n              <span style=\"font-size: 12.5px; padding: 6px 11px; border-radius: 999px; background: #fff; border: 1px solid rgba(10,11,13,.1);\">{{ city }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top: 1px solid rgba(10,11,13,.10); padding: 40px 24px; background: #F4F6F8;\">\n    <div style=\"max-width: 1080px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 20px;\">\n      <div style=\"display: flex; flex-direction: column; line-height: 1;\">\n        <span style=\"font-family: Archivo, sans-serif; font-weight: 800; font-size: 17px;\">J Bitar<\u002Fspan>\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8.5px; letter-spacing: .18em; color: #0A5FFF; margin-top: 4px;\">GLASS<\u002Fspan>\n      <\u002Fdiv>\n      <nav style=\"display: flex; flex-wrap: wrap; gap: 18px;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <button sc-camel-on-click=\"{{ item.onClick }}\" style=\"background: none; border: none; font-size: 14px; color: #4A4D52; cursor: pointer; padding: 0;\">{{ item.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #4A4D52;\">© {{ year }} J Bitar Glass · Serving the GTA<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <nav id=\"mobile-tabbar\" style=\"position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 70; display: flex; align-items: center; gap: 4px; background: #FFFFFF; border-radius: 999px; padding: 6px; box-shadow: 0 12px 32px rgba(10,11,13,.18); border: 1px solid rgba(10,11,13,.06);\">\n    <sc-for list=\"{{ tabBarItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n      <button sc-camel-on-click=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n        <span style=\"font-size: 18px; line-height: 1;\">{{ item.icon }}<\u002Fspan>\n        <span style=\"font-size: 10.5px; font-weight: 600; letter-spacing: -0.01em;\">{{ item.label }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst NAV_ITEMS = [\n  { id: 'services', label: 'Services' },\n  { id: 'whole-home', label: 'Whole-Home' },\n  { id: 'security', label: 'Security' },\n  { id: 'reviews', label: 'Reviews' },\n  { id: 'contact', label: 'Contact' }\n];\n\nconst SERVICES = [\n  {\n    icon: 'shower', room: 'BATHROOM', name: 'Shower enclosures', note: 'Frameless & corner units, 10 mm tempered',\n    spec: '10 MM TEMPERED · LOW-IRON AVAILABLE · CSA CERTIFIED',\n    overview: \"Frameless, semi-frameless, corner and neo-angle shower enclosures, templated on site and fabricated in 10 mm tempered glass. This is the most requested single job in the house, and the one where a millimetre of error shows the most.\",\n    includes: [\n      'On-site measure and template of the exact opening',\n      'Hardware finish: chrome, matte black, brushed nickel or brushed brass',\n      'Frameless, semi-frameless, corner or neo-angle layouts',\n      'Optional hydrophobic coating so water sheets off instead of spotting'\n    ],\n    faq: [\n      { q: \"Frameless vs. semi-frameless — what's the real difference?\", a: 'Frameless has no metal border around the glass at all. Semi-frameless keeps a slim frame around the door only, usually the lower-cost option and still clean-looking.' },\n      { q: 'How long does a shower enclosure install take?', a: 'Usually a single visit — three to five hours depending on size, layout and hardware.' },\n      { q: 'Do you do corner and neo-angle showers?', a: 'Yes — corner units with a return panel, and neo-angle layouts for tighter bathroom corners.' }\n    ],\n    ctaLabel: 'Get a shower quote'\n  },\n  {\n    icon: 'railing', room: 'STAIRCASE · BALCONY', name: 'Glass railings', note: '10–12 mm structural, built to code',\n    spec: '10–12 MM TEMPERED/LAMINATED · OBC COMPLIANT · STAINLESS HARDWARE',\n    overview: 'Stair, balcony and deck railings in structural glass — engineered and installed to meet Ontario building code guard requirements, with the base-shoe or standoff hardware system that suits the opening.',\n    includes: [\n      'Standoff (post-mounted) or frameless base-shoe systems',\n      'Tempered or laminated glass depending on height and load',\n      'Stainless steel or powder-coated hardware finishes',\n      'Engineering documentation prepared as part of the quote'\n    ],\n    faq: [\n      { q: 'Do glass railings need a permit in Ontario?', a: 'Most guard installs above a set height do. We handle the supporting engineering documentation as part of the quote.' },\n      { q: 'Tempered or laminated for a balcony railing?', a: 'Laminated is generally required at height for guard glass, since it stays in place even if it cracks. We confirm what your railing height requires before quoting.' },\n      { q: 'Can railing glass match the rest of the house?', a: 'Yes — ordering it alongside your other glass keeps tint and thickness consistent.' }\n    ],\n    ctaLabel: 'Get a railing quote'\n  },\n  {\n    icon: 'mirror', room: 'VANITY · HALL · GYM', name: 'Mirrors & custom mirrors', note: 'Backlit, beveled, wall-to-wall',\n    spec: '4–6 MM MIRROR GLASS · BEVELED EDGE OPTION · LED-READY',\n    overview: 'Beveled, backlit and frameless mirrors, cut and polished to the exact space — vanities, full gym or dance-studio walls, closet doors, and tinted or antiqued glass for a warmer look.',\n    includes: [\n      'Vanity mirrors cut around outlets, sconces and fixtures',\n      'LED-backlit mirrors with even, shadow-free light',\n      'Wall-to-wall mirror for gyms, studios and hallways',\n      'Bronze, grey and smoke tints available'\n    ],\n    faq: [\n      { q: 'Can you cut a mirror around outlets and fixtures?', a: 'Yes — we template on site so every cutout lines up exactly before fabrication.' },\n      { q: 'What is a backlit mirror?', a: \"An LED strip mounted behind or around the mirror's edge for soft, even light — popular for vanities and makeup areas.\" },\n      { q: 'Do you do smoked or tinted mirror?', a: 'Yes — bronze, grey and smoke tints for a warmer or more contemporary look.' }\n    ],\n    ctaLabel: 'Get a mirror quote'\n  },\n  {\n    icon: 'backsplash', room: 'KITCHEN · OFFICE', name: 'Backsplashes & table tops', note: 'Back-painted glass, furniture-grade edges',\n    spec: '6–10 MM GLASS · BACK-PAINTED · POLISHED EDGE',\n    overview: 'Back-painted glass backsplashes in any colour, plus protective table and desk tops with furniture-grade polished edges — a single seamless surface instead of tile and grout.',\n    includes: [\n      'Back-paint colour-matched to any paint code or sample',\n      'Cutouts for outlets, switch plates and hoods',\n      'Protective table, desk and counter tops, cut to shape',\n      'Floating glass shelves with polished edges'\n    ],\n    faq: [\n      { q: 'Can the backsplash match my paint colour exactly?', a: 'Yes — bring the paint code or a sample and we match it in the back-paint finish.' },\n      { q: 'Is glass better than tile for a backsplash?', a: \"It's a single seamless surface with no grout lines to stain, and it wipes clean in one pass.\" },\n      { q: 'Can you protect an existing wood table with a glass top?', a: 'Yes — cut to the exact shape, with or without felt bumpers.' }\n    ],\n    ctaLabel: 'Get a backsplash quote'\n  },\n  {\n    icon: 'window', room: 'EVERY WINDOW', name: 'Foggy window · IGU replacement', note: 'We replace the sealed unit — not the whole window',\n    spec: 'LOW-E COATED · ARGON FILLED · ENERGY STAR ELIGIBLE',\n    overview: 'A foggy window almost never means a new window. The seal on the insulated glass unit (IGU) has failed and let moisture in — we replace just the sealed glass unit, matching the Low-E coating and gas fill, without touching the frame.',\n    includes: [\n      'On-site measure of the existing sash and glazing pocket',\n      'Low-E coating and argon fill matched to the original spec',\n      'Energy Star–eligible replacement units where applicable',\n      'One unit or a whole house, done room by room'\n    ],\n    faq: [\n      { q: 'Why does a window go foggy?', a: 'The seal between the two panes fails and lets moisture in — the glass itself is usually fine, only the seal has given out.' },\n      { q: \"Do I need a whole new window if it's foggy?\", a: 'Almost never. Replacing just the sealed unit is faster and far cheaper than a full window and frame replacement.' },\n      { q: 'How long does IGU replacement take?', a: 'Most homes are done in a single day, one unit at a time, with no mess left inside.' }\n    ],\n    ctaLabel: 'Get an IGU quote'\n  },\n  {\n    icon: 'security', room: 'ENTRY · PATIO · GROUND FLOOR', name: 'Security glass', note: 'Laminated glass that stays in the frame when struck',\n    spec: 'LAMINATED PVB/SGP · UV FILTERING · SOUND DAMPENING', hasDiagram: true,\n    overview: 'Laminated security glass for entry doors, patio sliders and ground-floor windows. It looks like ordinary glass — the difference is entirely in what happens when someone tries to get through it: it cracks, but the interlayer holds it in the frame.',\n    includes: [\n      'PVB or SGP laminated glass, sourced to spec from certified suppliers',\n      'Sized to fit existing frames — no structural changes needed',\n      'Optional acoustic upgrade — the same laminate cuts outside noise',\n      'UV-filtering interlayer slows fading of floors and furniture'\n    ],\n    faq: [\n      { q: 'Does security glass look different from regular glass?', a: \"No — same clarity, same appearance. The difference is entirely in what happens when it's struck.\" },\n      { q: 'Which windows should be prioritized first?', a: 'Entry-door glazing and ground-floor windows — the most common points of entry, and the highest-impact upgrade.' },\n      { q: 'Does J Bitar Glass work on condos and apartments, not just houses?', a: 'Yes — houses, townhouses, condos and small commercial spaces across the GTA.' }\n    ],\n    ctaLabel: 'Get a security glass quote'\n  }\n];\n\nconst REVIEWS = [\n  { quote: 'Professional from first call to final walkthrough — honest recommendations and a spotless finish.', source: 'Google review ★★★★★' },\n  { quote: 'Joseph clearly takes pride in his craft — every detail precise, the result crystal-clear.', source: 'Google review ★★★★★' },\n  { quote: 'Heavy 10 mm glass, high-end hardware, on time — the finished look is modern and clean.', source: 'Google review ★★★★★' }\n];\n\nconst PROCESS = [\n  { n: '01', title: 'Site visit', text: 'Joseph templates the opening to the millimetre — no guesswork at install.' },\n  { n: '02', title: 'Fabrication', text: 'Cut, tempered and polished to spec. Hardware finish confirmed with you first.' },\n  { n: '03', title: 'Install', text: 'Floors protected, site left spotless — usually one visit.' },\n  { n: '04', title: 'Walkthrough', text: 'Fit and finish checked together, with care advice that keeps it flawless.' }\n];\n\nconst CHIPS = ['Showers', 'Railings', 'Mirrors', 'Backsplash', 'Table tops', 'IGU/Windows', 'Security'];\nconst CITIES = ['Brampton', 'Mississauga', 'Toronto', 'Vaughan', 'Caledon', 'Oakville'];\n\nclass Component extends DCLogic {\n  state = {\n    navOpen: false,\n    isMobile: false,\n    activeSection: '',\n    rating: 5.0,\n    reviewCount: 47,\n    openIndexes: {}\n  };\n\n  componentDidMount() {\n    this._sections = NAV_ITEMS.map(n => document.getElementById(n.id)).filter(Boolean);\n    this._observer = new IntersectionObserver(entries => {\n      entries.forEach(e => { if (e.isIntersecting) this.setState({ activeSection: e.target.id }); });\n    }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });\n    this._sections.forEach(el => this._observer.observe(el));\n\n    this._onResize = () => this.setState({ isMobile: window.innerWidth < 960 });\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n\n    this.loadRating();\n  }\n\n  componentWillUnmount() {\n    if (this._observer) this._observer.disconnect();\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  // Live Google rating: replace API_KEY with a referrer-restricted Places API (New) key\n  // (Google Cloud Console → enable Places API (New) → restrict key to your domain).\n  // Falls back silently to the static state values above if the key is missing/blocked/quota'd.\n  loadRating() {\n    const PLACE_ID = 'ChIJzU_1YsuOxq8RjTMB2qLBQ_U';\n    const API_KEY = 'YOUR_GOOGLE_PLACES_API_KEY';\n    fetch(`https://places.googleapis.com/v1/places/${PLACE_ID}`, {\n      headers: { 'X-Goog-Api-Key': API_KEY, 'X-Goog-FieldMask': 'rating,userRatingCount' }\n    })\n      .then(res => { if (!res.ok) throw new Error('places api failed'); return res.json(); })\n      .then(data => this.setState({\n        rating: data.rating != null ? data.rating : this.state.rating,\n        reviewCount: data.userRatingCount != null ? data.userRatingCount : this.state.reviewCount\n      }))\n      .catch(() => {});\n  }\n\n  scrollToSection(id) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const top = el.getBoundingClientRect().top + window.scrollY - 96;\n    window.scrollTo({ top, behavior: 'smooth' });\n    this.setState({ navOpen: false, activeSection: id });\n  }\n\n  toggleAccordion(idx, isOpen) {\n    this.setState(s => ({ openIndexes: { ...s.openIndexes, [idx]: isOpen } }));\n  }\n\n  scrollToSecurityDetail(e) {\n    e.preventDefault();\n    this.setState(s => ({ openIndexes: { ...s.openIndexes, 5: true } }));\n    requestAnimationFrame(() => {\n      const el = document.getElementById('service-security');\n      if (!el) return;\n      const top = el.getBoundingClientRect().top + window.scrollY - 96;\n      window.scrollTo({ top, behavior: 'smooth' });\n    });\n  }\n\n  renderVals() {\n    const navItems = NAV_ITEMS.map(n => ({\n      ...n,\n      isActive: this.state.activeSection === n.id,\n      onClick: () => this.scrollToSection(n.id)\n    }));\n\nconst TAB_ACTIVE_STYLE = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:64px;padding:8px 10px;border-radius:999px;border:none;cursor:pointer;background:#0A5FFF;color:#fff;font-family:Inter,sans-serif;';\n    const TAB_INACTIVE_STYLE = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:64px;padding:8px 10px;border-radius:999px;border:none;cursor:pointer;background:transparent;color:#4A4D52;font-family:Inter,sans-serif;';\n    const tabBarItems = [\n      { key: 'home', label: 'Home', icon: '🏠', isActive: !this.state.activeSection, style: !this.state.activeSection ? TAB_ACTIVE_STYLE : TAB_INACTIVE_STYLE, onClick: () => { window.scrollTo({ top: 0, behavior: 'smooth' }); this.setState({ activeSection: '', navOpen: false }); } },\n      { key: 'services', label: 'Services', icon: '🔧', isActive: this.state.activeSection === 'services', style: this.state.activeSection === 'services' ? TAB_ACTIVE_STYLE : TAB_INACTIVE_STYLE, onClick: () => this.scrollToSection('services') },\n      { key: 'whole-home', label: 'Whole-Home', icon: '🏡', isActive: this.state.activeSection === 'whole-home', style: this.state.activeSection === 'whole-home' ? TAB_ACTIVE_STYLE : TAB_INACTIVE_STYLE, onClick: () => this.scrollToSection('whole-home') },\n      { key: 'contact', label: 'Contact', icon: '✉️', isActive: this.state.activeSection === 'contact', style: this.state.activeSection === 'contact' ? TAB_ACTIVE_STYLE : TAB_INACTIVE_STYLE, onClick: () => this.scrollToSection('contact') }\n    ];\n\n    const services = SERVICES.map((s, i) => ({\n      ...s,\n      hasDiagram: !!s.hasDiagram,\n      domId: i === 5 ? 'service-security' : `service-${i}`,\n      isOpen: !!this.state.openIndexes[i],\n      iconRotation: this.state.openIndexes[i] ? 45 : 0,\n      onToggle: (e) => this.toggleAccordion(i, e.target.open)\n    }));\n\n    return {\n      year: new Date().getFullYear(),\n      rating: this.state.rating.toFixed(1),\n      reviewCount: this.state.reviewCount,\n      navItems,\n      tabBarItems,\n      services,\n      reviews: REVIEWS,\n      process: PROCESS,\n      chips: CHIPS,\n      cities: CITIES,\n      navOpen: this.state.navOpen,\n      showDesktopNav: !this.state.isMobile,\n      showMobileToggle: this.state.isMobile,\n      toggleMobileMenu: () => this.setState(s => ({ navOpen: !s.navOpen })),\n      scrollTop: () => window.scrollTo({ top: 0, behavior: 'smooth' }),\n      scrollToSecurityDetail: (e) => this.scrollToSecurityDetail(e),\n      securityFaqHref: '#service-security',\n      navHoverStyle: { background: 'rgba(10,95,255,.08)', color: '#0A5FFF' },\n      primaryBtnHover: { background: '#083FB0' }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
